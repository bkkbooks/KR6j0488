body:
  text: 大興善寺三藏沙門大廣智不空奉詔譯先應結毗盧遮那佛印次印相者二手內相叉並竪二大指即成誦真言七遍頂上散真言曰曩莫三滿多沒馱南阿尾羅吽欠次結摩利支菩薩根本真言印次印相者以二手內相叉竪合二頭指二中指各糾持二頭指令相捻二大指並竪合即成誦真言加持身五處印額次右肩次左肩次心次喉上以各誦一遍真言曰曩謨引囉怛曩二合怛囉二合夜耶一怛儞也二合他引二遏迦沫思三沫迦沫思遏度引沫思四旨跛囉沫思五摩賀引旨跛囉沫思六按怛馱娜沫思七摩哩制野沫思八曩謨薩都二合帝九𡀩乞叉二合𡀩乞叉二合𤚥引十薩嚩薩怛嚩二合難引者十一薩嚩怛囉二合薩嚩波庾引十二跛捺囉二合吠毗藥二合娑嚩二合訶引十三次結摩利支菩薩心印真言曰曩莫三滿多沒馱引南引唵摩引利哩制曳沙嚩二合訶次結心真言印相者以左手虛作拳頭指大母指相捻如環想自身入左手拳中以右手覆左拳上即想此印為摩利支菩薩形想自身在摩利支菩薩心中不斷絶誦身真言應時獲得殊勝加持不被一切惡人為障礙者所見一切災禍皆不著身一切口舌皆得除滅蟲狼虎豹水火盜則賊皆不能侵害所求世間果報皆得諧偶若修出世間法即得禪定現前智慧增盛獲得聞持不忘失菩提心法誦真言時深起悲愍為一切有情拔除苦惱皆獲無障解脫速證無上菩提道應須祕密勿妄傳授
